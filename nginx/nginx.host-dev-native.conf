# Native nginx (no Docker): reverse proxy on :8080 for local dev.
# - Main app: 127.0.0.1:3005   (npm run dev:behind-proxy)
# - Portals:   3008 /guest, 3006 /freelancer, 3007 /employee  (npm run dev:portals:proxy)
# - API:       127.0.0.1:8002 (adjust api_dev if your backend port differs)
#
# Windows (winget nginx): run from repo root:
#   .\scripts\start-nginx-local-reverse-proxy.ps1
#
# Manual:
#   nginx.exe -p "C:\path\to\nginx-1.x" -c "D:\techbank\bank.ai\nginx\nginx.host-dev-native.conf"
#   (-p must be the nginx install folder that contains conf\mime.types)

events {
    worker_connections 1024;
}

http {
    include       conf/mime.types;
    default_type  application/octet-stream;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream vite_main {
        server 127.0.0.1:3005;
    }

    upstream vite_guest {
        server 127.0.0.1:3008;
    }

    upstream vite_freelancer {
        server 127.0.0.1:3006;
    }

    upstream vite_employee {
        server 127.0.0.1:3007;
    }

    upstream api_dev {
        server 127.0.0.1:8002;
    }

    server {
        # listen 80;
        listen 8080;
        server_name _;

        # Trailing slash (Vite base paths)
        location = /guest {
            return 308 /guest/;
        }
        location = /freelancer {
            return 308 /freelancer/;
        }
        location = /employee {
            return 308 /employee/;
        }

        # Admin SPA path (was /admin)
        location = /techbank {
            return 308 /techbank/;
        }
        location ~ ^/admin(.*)$ {
            return 308 /techbank$1;
        }

        # API + docs (longer prefixes; list before location /)
        location /api/ {
            proxy_pass http://api_dev/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://api_dev/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api_dev/openapi.json;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            proxy_pass http://api_dev/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Portals from main SPA dev server (single frontend process)
        location /guest {
            proxy_pass http://vite_main;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /freelancer {
            proxy_pass http://vite_main;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /employee {
            proxy_pass http://vite_main;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Main SPA
        location / {
            proxy_pass http://vite_main;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
