version: "3.8"

services:
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-host.docker.internal:3005}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:8002}
    volumes:
      - ./nginx/nginx.host-dev.template:/templates/nginx.host-dev.template:ro
      - ./nginx/docker-host-dev-entrypoint.sh:/custom-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/custom-entrypoint.sh"]
